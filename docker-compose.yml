services:
  db:
    image: mysql:8.0
    volumes:
      - db-data:/var/lib/mysql
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "true"
    ports:
      - "3306:3306"

  app:
    build:
      context: .
      dockerfile: ./Dockerfile.dev
    volumes:
      - .:/app
    ports:
      - "3001:3000"
    env_file:
      - .env
    depends_on:
      - db

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    ports:
      - '8500:8500'
      - '8501:8501'
    volumes:
      - ./minio_data:/export
    entrypoint: bash
    command: -c "/opt/bin/minio server /export --address :8500 --console-address :8501"
    environment:
      MINIO_ROOT_USER: access_key
      MINIO_ROOT_PASSWORD: secret_key

volumes:
  db-data:
